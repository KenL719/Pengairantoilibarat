<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIMDA — Sistem Monitoring Debit Air Irigasi</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --blue: #388bfd;
    --blue-dark: #1f6feb;
    --green: #3fb950;
    --green-dark: #238636;
    --orange: #d29922;
    --orange-light: #e3b341;
    --red: #f85149;
    --purple: #bc8cff;
    --teal: #39d353;
    --cyan: #56d364;
    /* Role colors */
    --admin-c: #388bfd;
    --pengamat-c: #bc8cff;
    --juru-c: #e3b341;
    --ppa-c: #3fb950;
    --pob-c: #f85149;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Sora',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

  /* LOGIN */
  #login-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(ellipse at 20% 50%, #0d2137 0%, #0d1117 60%);
    position:relative; overflow:hidden;
  }
  #login-screen::before {
    content:''; position:absolute; inset:0;
    background: repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(56,139,253,0.03) 60px, rgba(56,139,253,0.03) 61px),
                repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(56,139,253,0.03) 60px, rgba(56,139,253,0.03) 61px);
  }
  .login-card {
    background:var(--bg2); border:1px solid var(--border); border-radius:16px;
    padding:48px 40px; width:420px; max-width:95vw; position:relative; z-index:1;
    box-shadow: 0 0 60px rgba(56,139,253,0.1);
  }
  .login-logo { text-align:center; margin-bottom:32px; }
  .login-logo .badge {
    display:inline-block; background:linear-gradient(135deg,#1f6feb,#388bfd);
    color:#fff; font-size:11px; font-weight:600; letter-spacing:2px;
    padding:4px 12px; border-radius:20px; margin-bottom:12px; text-transform:uppercase;
  }
  .login-logo h1 { font-size:28px; font-weight:700; letter-spacing:-1px; }
  .login-logo h1 span { color:var(--blue); }
  .login-logo p { color:var(--muted); font-size:13px; margin-top:6px; }
  .form-group { margin-bottom:16px; }
  .form-group label { display:block; font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
  .form-group select, .form-group input {
    width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px;
    color:var(--text); padding:12px 14px; font-size:14px; font-family:'Sora',sans-serif;
    transition:border-color .2s;
  }
  .form-group select:focus, .form-group input:focus { outline:none; border-color:var(--blue); }
  .form-group select option { background:var(--bg3); }
  .btn-login {
    width:100%; padding:14px; background:linear-gradient(135deg,#1f6feb,#388bfd);
    border:none; border-radius:8px; color:#fff; font-family:'Sora',sans-serif;
    font-size:15px; font-weight:600; cursor:pointer; margin-top:8px;
    transition:all .2s; letter-spacing:.5px;
  }
  .btn-login:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(56,139,253,0.3); }
  .demo-hint { background:rgba(56,139,253,0.08); border:1px solid rgba(56,139,253,0.2); border-radius:8px; padding:12px; margin-top:16px; }
  .demo-hint p { font-size:12px; color:var(--muted); line-height:1.8; }
  .demo-hint strong { color:var(--blue); }

  /* APP */
  #app { display:none; min-height:100vh; }

  /* SIDEBAR */
  .sidebar {
    position:fixed; left:0; top:0; bottom:0; width:240px;
    background:var(--bg2); border-right:1px solid var(--border);
    display:flex; flex-direction:column; z-index:100;
    transition:transform .3s;
  }
  .sidebar-header { padding:20px; border-bottom:1px solid var(--border); }
  .sidebar-logo { font-size:18px; font-weight:700; letter-spacing:-0.5px; }
  .sidebar-logo span { color:var(--blue); }
  .sidebar-role {
    margin-top:8px; font-size:11px; font-weight:600; letter-spacing:1px;
    text-transform:uppercase; padding:3px 10px; border-radius:20px; display:inline-block;
  }
  .sidebar-nav { flex:1; padding:12px 8px; overflow-y:auto; }
  .nav-section { margin-bottom:20px; }
  .nav-section-label { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; padding:0 8px; margin-bottom:6px; }
  .nav-item {
    display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:8px;
    font-size:13px; font-weight:500; cursor:pointer; transition:all .15s; color:var(--muted);
    border:1px solid transparent;
  }
  .nav-item:hover { background:var(--bg3); color:var(--text); }
  .nav-item.active { background:rgba(56,139,253,0.12); color:var(--blue); border-color:rgba(56,139,253,0.2); }
  .nav-item .icon { width:18px; text-align:center; font-size:14px; }
  .sidebar-footer { padding:16px; border-top:1px solid var(--border); }
  .user-card { display:flex; align-items:center; gap:10px; }
  .user-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; }
  .user-info .name { font-size:13px; font-weight:600; }
  .user-info .role-tag { font-size:11px; color:var(--muted); }
  .btn-logout { margin-left:auto; background:none; border:1px solid var(--border); color:var(--muted); border-radius:6px; padding:5px 8px; cursor:pointer; font-size:11px; transition:all .2s; }
  .btn-logout:hover { border-color:var(--red); color:var(--red); }

  /* MAIN */
  .main { margin-left:240px; min-height:100vh; background:var(--bg); }
  .topbar {
    position:sticky; top:0; z-index:50; background:rgba(13,17,23,0.9);
    backdrop-filter:blur(12px); border-bottom:1px solid var(--border);
    padding:0 24px; height:56px; display:flex; align-items:center; justify-content:between;
  }
  .topbar h2 { font-size:16px; font-weight:600; flex:1; }
  .topbar-actions { display:flex; align-items:center; gap:10px; margin-left:auto; }
  .content { padding:24px; }

  /* CARDS */
  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
  .stat-card {
    background:var(--bg2); border:1px solid var(--border); border-radius:12px;
    padding:20px; position:relative; overflow:hidden;
  }
  .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
  .stat-card.blue::before { background:linear-gradient(90deg,var(--blue),transparent); }
  .stat-card.green::before { background:linear-gradient(90deg,var(--green),transparent); }
  .stat-card.orange::before { background:linear-gradient(90deg,var(--orange-light),transparent); }
  .stat-card.red::before { background:linear-gradient(90deg,var(--red),transparent); }
  .stat-card.purple::before { background:linear-gradient(90deg,var(--purple),transparent); }
  .stat-icon { font-size:24px; margin-bottom:10px; }
  .stat-value { font-size:28px; font-weight:700; font-family:'JetBrains Mono',monospace; }
  .stat-label { font-size:12px; color:var(--muted); margin-top:4px; }
  .stat-change { font-size:11px; margin-top:8px; }
  .stat-change.up { color:var(--green); }
  .stat-change.down { color:var(--red); }

  /* PANEL */
  .panel { background:var(--bg2); border:1px solid var(--border); border-radius:12px; margin-bottom:20px; }
  .panel-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .panel-title { font-size:14px; font-weight:600; display:flex; align-items:center; gap:8px; }
  .panel-body { padding:20px; }

  /* FORM */
  .form-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-bottom:14px; }
  .field { display:flex; flex-direction:column; gap:6px; }
  .field label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; }
  .field input, .field select, .field textarea {
    background:var(--bg3); border:1px solid var(--border); border-radius:8px;
    color:var(--text); padding:10px 12px; font-size:13px; font-family:'Sora',sans-serif;
    transition:border-color .2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { outline:none; border-color:var(--blue); }
  .field input[readonly] { opacity:.6; cursor:not-allowed; }
  .field .hint { font-size:11px; color:var(--muted); }
  .field .result-val { background:rgba(56,139,253,0.08); border-color:rgba(56,139,253,0.3); color:var(--blue); font-family:'JetBrains Mono',monospace; font-weight:600; }

  /* BUTTONS */
  .btn { display:inline-flex; align-items:center; gap:6px; padding:9px 16px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:none; font-family:'Sora',sans-serif; transition:all .2s; }
  .btn-primary { background:linear-gradient(135deg,#1f6feb,#388bfd); color:#fff; }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(56,139,253,0.3); }
  .btn-success { background:linear-gradient(135deg,#238636,#3fb950); color:#fff; }
  .btn-success:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(63,185,80,0.3); }
  .btn-warning { background:linear-gradient(135deg,#9e6a03,#d29922); color:#fff; }
  .btn-danger { background:linear-gradient(135deg,#b91c1c,#f85149); color:#fff; }
  .btn-outline { background:transparent; color:var(--muted); border:1px solid var(--border); }
  .btn-outline:hover { border-color:var(--blue); color:var(--blue); }
  .btn-sm { padding:6px 12px; font-size:12px; }

  /* TABLE */
  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th { padding:10px 14px; text-align:left; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; border-bottom:1px solid var(--border); background:var(--bg3); }
  tbody td { padding:11px 14px; border-bottom:1px solid rgba(48,54,61,0.5); vertical-align:middle; }
  tbody tr:hover { background:rgba(255,255,255,0.02); }
  .badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; letter-spacing:.3px; }
  .badge-draft { background:rgba(139,148,158,0.15); color:var(--muted); }
  .badge-pending { background:rgba(211,153,34,0.15); color:var(--orange-light); }
  .badge-verified { background:rgba(63,185,80,0.15); color:var(--green); }
  .badge-rejected { background:rgba(248,81,73,0.15); color:var(--red); }

  /* TABS */
  .tabs { display:flex; gap:4px; background:var(--bg3); border-radius:10px; padding:4px; margin-bottom:20px; }
  .tab { flex:1; padding:8px; text-align:center; font-size:13px; font-weight:500; color:var(--muted); border-radius:7px; cursor:pointer; transition:all .2s; }
  .tab.active { background:var(--bg2); color:var(--text); box-shadow:0 1px 6px rgba(0,0,0,0.3); }

  /* CHART */
  .chart-container { height:200px; display:flex; align-items:flex-end; gap:6px; padding:10px 0; }
  .chart-bar { flex:1; background:linear-gradient(to top,rgba(56,139,253,0.6),rgba(56,139,253,0.2)); border-radius:4px 4px 0 0; position:relative; cursor:pointer; transition:all .2s; min-height:4px; }
  .chart-bar:hover { background:linear-gradient(to top,var(--blue),rgba(56,139,253,0.4)); }
  .chart-bar .tip { position:absolute; bottom:100%; left:50%; transform:translateX(-50%); background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:4px 8px; font-size:11px; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity .2s; margin-bottom:4px; font-family:'JetBrains Mono',monospace; }
  .chart-bar:hover .tip { opacity:1; }
  .chart-labels { display:flex; gap:6px; }
  .chart-labels span { flex:1; text-align:center; font-size:10px; color:var(--muted); }

  /* BLANKO PREVIEW */
  .blanko-preview {
    background:#fff; color:#000; border-radius:8px; padding:20px;
    font-family:'Times New Roman',serif; font-size:12px; line-height:1.6;
    max-height:500px; overflow-y:auto;
  }
  .blanko-preview h3 { text-align:center; font-size:14px; margin-bottom:4px; }
  .blanko-preview .subtitle { text-align:center; font-size:11px; margin-bottom:16px; }
  .blanko-table { width:100%; border-collapse:collapse; margin-bottom:12px; font-size:11px; }
  .blanko-table th, .blanko-table td { border:1px solid #000; padding:4px 6px; text-align:center; }
  .blanko-table th { background:#e0e0e0; font-weight:bold; }
  .blanko-sigs { display:flex; justify-content:space-between; margin-top:20px; }
  .blanko-sig { text-align:center; width:30%; }
  .blanko-sig .sig-line { border-bottom:1px solid #000; height:60px; margin-bottom:4px; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .2s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--bg2); border:1px solid var(--border); border-radius:16px; width:700px; max-width:95vw; max-height:90vh; overflow-y:auto; transform:scale(.95); transition:transform .2s; }
  .modal-overlay.open .modal { transform:scale(1); }
  .modal-header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .modal-header h3 { font-size:15px; font-weight:600; }
  .modal-close { background:none; border:none; color:var(--muted); cursor:pointer; font-size:20px; line-height:1; }
  .modal-close:hover { color:var(--red); }
  .modal-body { padding:24px; }
  .modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }

  /* ALERT */
  .alert { padding:12px 16px; border-radius:8px; font-size:13px; margin-bottom:16px; display:flex; align-items:flex-start; gap:10px; }
  .alert-info { background:rgba(56,139,253,0.1); border:1px solid rgba(56,139,253,0.3); color:#93bbff; }
  .alert-success { background:rgba(63,185,80,0.1); border:1px solid rgba(63,185,80,0.3); color:#7ee787; }
  .alert-warning { background:rgba(210,153,34,0.1); border:1px solid rgba(210,153,34,0.3); color:#e3b341; }

  /* FORMULA CARDS */
  .formula-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:14px; }
  .formula-card { background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:16px; cursor:pointer; transition:all .2s; }
  .formula-card:hover { border-color:var(--blue); background:rgba(56,139,253,0.05); }
  .formula-card.selected { border-color:var(--green); background:rgba(63,185,80,0.07); }
  .formula-name { font-size:13px; font-weight:600; margin-bottom:4px; }
  .formula-eq { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--blue); background:rgba(56,139,253,0.1); padding:6px 10px; border-radius:6px; margin:8px 0; }
  .formula-desc { font-size:11px; color:var(--muted); }

  /* USERS */
  .user-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; }
  .user-card-item { background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:16px; }
  .user-card-header { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .user-card-avatar { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; }
  .user-card-name { font-size:14px; font-weight:600; }
  .user-card-role { font-size:11px; color:var(--muted); }

  /* TOAST */
  #toast { position:fixed; bottom:24px; right:24px; z-index:999; }
  .toast-item { background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:12px 16px; margin-top:8px; font-size:13px; display:flex; align-items:center; gap:10px; min-width:250px; box-shadow:0 8px 32px rgba(0,0,0,0.4); animation:slideIn .3s; }
  .toast-item.success { border-color:var(--green); }
  .toast-item.error { border-color:var(--red); }
  @keyframes slideIn { from { transform:translateX(100px); opacity:0; } to { transform:translateX(0); opacity:1; } }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  .hidden { display:none !important; }
  .flex { display:flex; }
  .items-center { align-items:center; }
  .gap-2 { gap:8px; }
  .gap-3 { gap:12px; }
  .ml-auto { margin-left:auto; }
  .text-muted { color:var(--muted); }
  .text-sm { font-size:12px; }
  .font-mono { font-family:'JetBrains Mono',monospace; }
  .mb-4 { margin-bottom:16px; }
  .mt-4 { margin-top:16px; }
  .w-full { width:100%; }
  .separator { border:none; border-top:1px solid var(--border); margin:16px 0; }
  .info-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(48,54,61,0.5); font-size:13px; }
  .info-row:last-child { border-bottom:none; }
  .info-label { color:var(--muted); }
  .info-val { font-weight:500; font-family:'JetBrains Mono',monospace; }
</style>
</head>

<!-- LOGIN -->

</div>

<!-- APP -->
<div id="app">
  <nav class="sidebar" id="sidebar">

      <div class="sidebar-logo"><span>SIM</span>DA</div>

      <div class="user-card">

  <main class="main">

      <h2 id="page-title">Dashboard</h2>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="main-content"></div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div id="toast"></div>

// ==================== AUTH ====================
function doLogin() {
  const role = document.getElementById('login-role').value;
  const user = document.getElementById('login-user').value;
  const pass = document.getElementById('login-pass').value;
  if (!role) { toast('Pilih role terlebih dahulu!','error'); return; }
  if (!user || !pass) { toast('Isi username dan password!','error'); return; }
  store.currentUser = { role, username:user, nama: role.toUpperCase()+' User' };
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initApp();
  toast('Selamat datang, '+store.currentUser.nama+'!','success');
}

function doLogout() {
  store.currentUser = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ==================== INIT APP ====================
function initApp() {
  const {role} = store.currentUser;
  const cfg = roleConfig[role];
  
  // Role badge
  const badge = document.getElementById('role-badge');
  badge.textContent = cfg.label;
  badge.style.background = cfg.bg;
  badge.style.color = cfg.color;
  
  // User avatar
  const av = document.getElementById('user-avatar');
  av.textContent = cfg.label[0];
  av.style.background = cfg.bg;
  av.style.color = cfg.color;
  document.getElementById('user-name-display').textContent = store.currentUser.username;
  document.getElementById('user-role-display').textContent = cfg.label;
  
  // Build sidebar nav
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  cfg.menus.forEach(sec => {
    const sDiv = document.createElement('div');
    sDiv.className = 'nav-section';
    sDiv.innerHTML = `<div class="nav-section-label">${sec.section}</div>`;
    sec.items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'nav-item';
      el.dataset.page = item.id;
      el.innerHTML = `<span class="icon">${item.icon}</span>${item.label}`;
      el.onclick = () => navigate(item.id);
      sDiv.appendChild(el);
    });
    nav.appendChild(sDiv);
  });
  
  navigate('dashboard');
}

// ==================== NAVIGATION ====================
function navigate(page) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  const titles = {
    'dashboard':'Dashboard','kelola-pengguna':'Kelola Pengguna',
    'lihat-data-06':'Data Blanko 06-O','lihat-data-08':'Data Blanko 08-O',
    'verif-06':'Verifikasi Blanko 06-O','verif-08':'Verifikasi Blanko 08-O',
    'input-06':'Input Data Hidrolika (Blanko 06-O)','input-08':'Input Data Operasi Bendung (Blanko 08-O)',
    'my-data-06':'Data Saya — Blanko 06-O','my-data-08':'Data Saya — Blanko 08-O',
    'cetak-06':'Cetak Blanko 06-O','cetak-08':'Cetak Blanko 08-O',
    'grafik-debit':'Grafik & Fluktuasi Debit Air',
  };
  document.getElementById('page-title').textContent = titles[page] || page;
  document.getElementById('topbar-actions').innerHTML = '';
  
  const content = document.getElementById('main-content');
  switch(page) {
    case 'dashboard': renderDashboard(content); break;
    case 'kelola-pengguna': renderKelolaPengguna(content); break;
    case 'lihat-data-06': renderDataTable(content,'06'); break;
    case 'lihat-data-08': renderDataTable(content,'08'); break;
    case 'verif-06': renderVerifikasi(content,'06'); break;
    case 'verif-08': renderVerifikasi(content,'08'); break;
    case 'input-06': renderInput06(content); break;
    case 'input-08': renderInput08(content); break;
    case 'my-data-06': renderMyData(content,'06'); break;
    case 'my-data-08': renderMyData(content,'08'); break;
    case 'cetak-06': renderCetak(content,'06'); break;
    case 'cetak-08': renderCetak(content,'08'); break;
    case 'grafik-debit': renderGrafik(content); break;
    default: content.innerHTML = '<p>Halaman tidak ditemukan.</p>';
  }
}

function hitungDebit(fid) {
  const g = 9.81; let Q = null;
  try {
    if(fid==='manning') { const n=+document.getElementById('p-n').value, A=+document.getElementById('p-A').value, R=+document.getElementById('p-R').value, S=+document.getElementById('p-S').value; Q=(1/n)*A*Math.pow(R,2/3)*Math.pow(S,0.5); }
    else if(fid==='ambang-lebar') { const Cd=+document.getElementById('p-Cd').value, b=+document.getElementById('p-b').value, H=+document.getElementById('p-H').value; Q=1.7*Cd*b*Math.pow(H,1.5); }
    else if(fid==='romijn') { const b=+document.getElementById('p-b').value, h=+document.getElementById('p-h').value; Q=0.544*b*h*Math.sqrt(2*g*h); }
    else if(fid==='cipoletti') { const b=+document.getElementById('p-b').value, H=+document.getElementById('p-H').value; Q=1.859*b*Math.pow(H,1.5); }
    else if(fid==='sharp-crested') { const Cd=+document.getElementById('p-Cd').value, b=+document.getElementById('p-b').value, H=+document.getElementById('p-H').value; Q=(2/3)*Cd*b*Math.sqrt(2*g)*Math.pow(H,1.5); }
    else if(fid==='triangular') { const Cd=+document.getElementById('p-Cd').value, th=+document.getElementById('p-theta').value*Math.PI/180, H=+document.getElementById('p-H').value; Q=(8/15)*Cd*Math.sqrt(2*g)*Math.tan(th/2)*Math.pow(H,2.5); }
    else if(fid==='velocity-area') { const A=+document.getElementById('p-A').value, V=+document.getElementById('p-V').value; Q=A*V; }
    else if(fid==='float') { const A=+document.getElementById('p-A').value, k=+document.getElementById('p-k').value, Vf=+document.getElementById('p-Vf').value; Q=A*k*Vf; }
    else if(fid==='parshall') { const Ha=+document.getElementById('p-Ha').value; Q=0.3*Math.pow(Ha,1.53); }
    else if(fid==='dye') { const q=+document.getElementById('p-q').value, C1=+document.getElementById('p-C1').value, C2=+document.getElementById('p-C2').value; Q=q*(C1/C2-1); }
  } catch(e){}
  if(Q!==null && !isNaN(Q) && Q>0) {
    window.lastDebit = Q;
    document.getElementById('debit-result').classList.remove('hidden');
    document.getElementById('debit-val').textContent = Q.toFixed(4);
    toast('Debit berhasil dihitung: '+Q.toFixed(4)+' m³/s','success');
  } else { toast('Isi semua parameter dengan benar!','error'); }
}

function simpanData06() {

  const f = formulas.find(x=>x.id===window.selectedFormula);

function hitungDebit08() {
  const h1 = parseFloat(document.getElementById('o-tma-hulu')?.value||0);
  const h2 = parseFloat(document.getElementById('o-tma-hilir')?.value||0);
  const a = parseFloat(document.getElementById('o-bukaan')?.value||0);
  const b = parseFloat(document.getElementById('o-lebar')?.value||1);
  const Cd = parseFloat(document.getElementById('o-cd')?.value||0.65);
  const dH = h1-h2;
  if(dH>0 && a>0 && b>0) {
    const Q = Cd*b*a*Math.sqrt(2*9.81*dH);
    document.getElementById('o-debit').value = Q.toFixed(4);
  }
}

            ${data.map(d=>`<tr>
              <td><input type="checkbox" class="chk-${type}" value="${d.id}"></td>
              <td>${d.tanggal}</td><td>${d.lokasi}</td><td class="font-mono">${d.debit} m³/s</td><td>${badgeHTML(d.status)}</td>
            </tr>`).join('')}
          </tbody>
        </table></div>
        <div class="flex gap-3 mt-4">
          <button class="btn btn-primary" onclick="showBlanko('${type}')">👁️ Preview Blanko ${type==='06'?'06':'08'}-O</button>
          <button class="btn btn-success" onclick="printBlanko('${type}')">🖨️ Cetak PDF</button>
        </div>
      </div>
    </div>
    <div id="blanko-preview-area" class="panel hidden mt-4">
      <div class="panel-header"><div class="panel-title">📄 Preview Blanko</div></div>
      <div class="panel-body" id="blanko-preview-body"></div>
    </div>
    `:''}
  `;
}

function checkAll(cb, type) { document.querySelectorAll('.chk-'+type).forEach(c=>c.checked=cb.checked); }

function showBlanko(type) {
  const checkedIds = [...document.querySelectorAll('.chk-'+type+':checked')].map(c=>+c.value);
  if(!checkedIds.length) { toast('Pilih data terlebih dahulu!','error'); return; }
  const data = (type==='06'?store.data06O:store.data08O).filter(d=>checkedIds.includes(d.id));
  const preview = document.getElementById('blanko-preview-area');
  const body = document.getElementById('blanko-preview-body');
  preview.classList.remove('hidden');
  body.innerHTML = `<div class="blanko-preview">${type==='06'?renderBlanko06HTML(data):renderBlanko08HTML(data)}</div>`;
}

function printBlanko(type) {
  const checkedIds = [...document.querySelectorAll('.chk-'+type+':checked')].map(c=>+c.value);
  if(!checkedIds.length) { toast('Pilih data terlebih dahulu!','error'); return; }
  const data = (type==='06'?store.data06O:store.data08O).filter(d=>checkedIds.includes(d.id));
  const html = `<html><head><style>body{font-family:Times New Roman,serif;font-size:12pt}table{width:100%;border-collapse:collapse}th,td{border:1px solid #000;padding:4px 6px;text-align:center}th{background:#e0e0e0}</style></head><body>${type==='06'?renderBlanko06HTML(data):renderBlanko08HTML(data)}</body></html>`;
  const w = window.open('','_blank'); w.document.write(html); w.document.close(); w.print();
}

function renderBlanko06HTML(data) {
  return `
    <h3>BLANKO 06-O</h3>
    <p class="subtitle">DATA PENGUKURAN DEBIT AIR SALURAN IRIGASI</p>
    <p style="text-align:right;font-size:11px">Bulan: ${new Date().toLocaleDateString('id-ID',{month:'long',year:'numeric'})}</p>
    <table class="blanko-table">
      <thead>
        <tr><th rowspan="2">No</th><th rowspan="2">Tanggal</th><th rowspan="2">Lokasi / Saluran</th><th rowspan="2">Metode Hidrolika</th><th colspan="2">Parameter</th><th rowspan="2">Debit Q (m³/s)</th><th rowspan="2">Verifikator</th><th rowspan="2">Ket.</th></tr>
        <tr><th>Rumus</th><th>Nilai</th></tr>
      </thead>
      <tbody>
        ${data.map((d,i)=>`<tr><td>${i+1}</td><td>${d.tanggal}</td><td>${d.lokasi} (${d.saluran})</td><td>${d.metode}</td><td style="font-size:10px">${d.rumus}</td><td>—</td><td><b>${d.debit}</b></td><td>${d.verifikator}</td><td>${d.catatan||''}</td></tr>`).join('')}
      </tbody>
    </table>
    <div class="blanko-sigs">
      <div class="blanko-sig"><div class="sig-line"></div><p>PPA / Petugas Ukur</p></div>
      <div class="blanko-sig"><div class="sig-line"></div><p>Juru Pengairan</p><p style="font-size:10px">(Verifikator)</p></div>
      <div class="blanko-sig"><div class="sig-line"></div><p>Pengamat / Kepala Ranting</p></div>
    </div>
  `;
}

function renderBlanko08HTML(data) {
  return `
    <h3>BLANKO 08-O</h3>
    <p class="subtitle">DATA OPERASI PINTU AIR DAN TINGGI MUKA AIR</p>
    <p style="text-align:right;font-size:11px">Bulan: ${new Date().toLocaleDateString('id-ID',{month:'long',year:'numeric'})}</p>
    <table class="blanko-table">
      <thead>
        <tr>
          <th>No</th><th>Tanggal</th><th>Lokasi Bendung</th><th>Pintu</th>
          <th>TMA Hulu (m)</th><th>Bukaan Pintu (m)</th><th>Debit Q (m³/s)</th>
          <th>Verifikator</th><th>Ket.</th>
        </tr>
      </thead>
      <tbody>
        ${data.map((d,i)=>`<tr><td>${i+1}</td><td>${d.tanggal}</td><td>${d.lokasi}</td><td>${d.pintu}</td><td>${d.tinggi}</td><td>${d.bukaan}</td><td><b>${d.debit}</b></td><td>${d.verifikator}</td><td>${d.catatan||''}</td></tr>`).join('')}
      </tbody>
    </table>
    <div class="blanko-sigs">
      <div class="blanko-sig"><div class="sig-line"></div><p>POB / Operator Bendung</p></div>
      <div class="blanko-sig"><div class="sig-line"></div><p>Juru Pengairan</p><p style="font-size:10px">(Verifikator)</p></div>
      <div class="blanko-sig"><div class="sig-line"></div><p>Pengamat / Kepala Ranting</p></div>
    </div>
  `;
}

// ==================== DETAIL VIEW ====================
function viewDetail(id, type) {
  const data = type==='06'?store.data06O:store.data08O;
  const d = data.find(x=>x.id===id);
  if(!d) return;
  document.getElementById('modal-title').textContent = `Detail Data — Blanko ${type==='06'?'06':'08'}-O`;
  document.getElementById('modal-body').innerHTML = `
    <div style="display:grid;gap:8px">
      ${Object.entries(type==='06'?{Tanggal:d.tanggal,Lokasi:d.lokasi,Saluran:d.saluran,Metode:d.metode,'Rumus':d.rumus,'Debit (m³/s)':d.debit,Petugas:d.petugas,Verifikator:d.verifikator,Status:d.status}:{Tanggal:d.tanggal,Lokasi:d.lokasi,Pintu:d.pintu,'TMA Hulu (m)':d.tinggi,'Bukaan Pintu (m)':d.bukaan,'Debit (m³/s)':d.debit,Petugas:d.petugas,Verifikator:d.verifikator,Status:d.status}).map(([k,v])=>`
        <div class="info-row"><span class="info-label">${k}</span><span class="info-val">${v}</span></div>
      `).join('')}
    </div>
  `;
  document.getElementById('modal-footer').innerHTML = `<button class="btn btn-outline" onclick="closeModalBtn()">Tutup</button>`;
  openModal();
}

// ==================== HELPERS ====================
function badgeHTML(status) {
  const map = {draft:'badge-draft',pending:'badge-pending',verified:'badge-verified',rejected:'badge-rejected'};
  const labels = {draft:'Draft',pending:'Menunggu',verified:'Terverifikasi',rejected:'Ditolak'};
  return `<span class="badge ${map[status]||'badge-draft'}">${labels[status]||status}</span>`;
}

function openModal() { document.getElementById('modal-overlay').classList.add('open'); }
function closeModal(e) { if(e.target===document.getElementById('modal-overlay')) closeModalBtn(); }
function closeModalBtn() { document.getElementById('modal-overlay').classList.remove('open'); }

function toast(msg, type='success') {
  const container = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = `toast-item ${type}`;
  el.innerHTML = `<span>${type==='success'?'✓':'✗'}</span>${msg}`;
  container.appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}

// Enter key for login
document.addEventListener('keydown', e => { if(e.key==='Enter' && document.getElementById('login-screen').style.display!=='none') doLogin(); });
</script>
